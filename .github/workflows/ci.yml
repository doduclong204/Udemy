name: CI Pipeline

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'pom.xml'
              - 'mvnw'
              - 'mvnw.cmd'
              - 'src/**'
              - '.github/workflows/**'
            frontend:
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'index.html'
              - 'src/**'
              - 'public/**'
              - 'components/**'
              - 'app/**'
              - '.github/workflows/**'

  backend:
    name: Build & Test Spring Boot
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Make mvnw executable
        run: chmod +x ./mvnw
      - name: Run Tests & Build
        run: ./mvnw clean verify
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
          if-no-files-found: error

  frontend:
    name: Build & Lint React + Vite
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          if-no-files-found: error