server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  data:
    web:
      pageable:
        one-indexed-parameters: true
  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/udemy}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

auth:
  jwt:
    base64-secret-access: ${JWT_SECRET_ACCESS}
    base64-secret-fresh: ${JWT_SECRET_REFRESH}
    access-token-validity-in-seconds: 8640000
    refresh-token-validity-in-seconds: 8640000

upload:
  file:
    uri: ${UPLOAD_URI:file:///E:/Udemy/upload/}
    image-uri: ${UPLOAD_IMAGE_URI:file:///E:/Udemy/upload/images/}
    video-uri: ${UPLOAD_VIDEO_URI:file:///E:/Udemy/upload/videos/}