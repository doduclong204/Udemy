spring:
  datasource:
    url: jdbc:mysql://localhost:3306/udemy?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

upload:
  file:
    uri: file:///tmp/upload/
    image-uri: file:///tmp/upload/images/
    video-uri: file:///tmp/upload/videos/

auth:
  jwt:
    base64-secret-access: ${JWT_SECRET_ACCESS}
    base64-secret-fresh: ${JWT_SECRET_REFRESH}
    access-token-validity-in-seconds: 3600
    refresh-token-validity-in-seconds: 3600

resend:
  api-key: ${RESEND_API_KEY}
  from-email: ${RESEND_FROM_EMAIL}

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID}